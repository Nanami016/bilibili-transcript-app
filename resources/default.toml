# Bilibili Transcript App 默认配置模板
# 应用配置存储在 ~/.bilibili-transcript/config.toml

[whisper]
mode = "openai"
api_url = "https://api.openai.com/v1/audio/transcriptions"
api_key = ""
model = "whisper-1"

[bilibili]
cookie = ""
video_dir = "~/Downloads/bilibili-download/video"
audio_dir = "~/Downloads/bilibili-download/audio"
transcript_dir = "~/Downloads/bilibili-download/transcript"

[ai_summary]
enabled = false
api_url = "https://api.openai.com/v1/chat/completions"
api_key = ""
model = "gpt-4o-mini"
